{% extends "layout.html" %}
{% block body %}
    <form action="{{ url_for('auth.login') }}" method="post">
        <h3>Login</h3>
        <div class="mb-3">
            <label for="formGroupExampleInput" class="form-label">Username</label>
            <input type="text" class="form-control" id="formGroupExampleInput" name = "username" placeholder="Enter your username" required>
        </div>
        <div class="mb-3">
            <label for="formGroupExampleInput2" class="form-label">Password</label>
            <input type="password" class="form-control" id="formGroupExampleInput2" name = "password" placeholder="Enter your password" required>
        </div>
        <a href="/signup">Don't have an account sign up</a><br><br>
        <button type="submit" class="btn btn-dark">Login</button>
    </form>
{% endblock %}
