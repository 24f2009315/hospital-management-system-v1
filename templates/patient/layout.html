<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand">Navbar</a><br>
    <form class="d-flex ms-auto" role="search" method="POST" action="{{ url_for('patient_api.search_users') }}"><br>
      <input class="form-control me-2" type="search" name = "query" placeholder="Search Doctors" aria-label="Search"/><br>
      <button class="btn btn-success" type="submit">Search</button><br>
    </form>
    <br>
    <a href="{{ url_for('auth.login') }}" class="btn btn-warning">logout</a>
  </div>
</nav>

<div class="container mt-4">
    {% block body %}
    {% endblock %}
</div>
<div class="card-body">
    {% block body1 %}
    {% endblock %}
</div>

</body>
</html>
