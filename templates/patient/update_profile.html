{% extends "patient/layout.html" %}
{% block body %}
<div class="container mt-4">
  <h2 class="mb-4">Update Profile</h2>
  <form method="POST" action="{{ url_for('patient_api.update_profile') }}">
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input type="text" name="name" class="form-control" value="{{ patient.name }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Age</label>
      <input type="number" name="age" class="form-control" value="{{ patient.age }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Gender</label>
      <select name="gender" class="form-control">
        <option value="Male" {% if patient.gender == "Male" %}selected{% endif %}>Male</option>
        <option value="Female" {% if patient.gender == "Female" %}selected{% endif %}>Female</option>
        <option value="Other" {% if patient.gender == "Other" %}selected{% endif %}>Other</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Contact</label>
      <input type="text" name="contact" class="form-control" value="{{ patient.contact }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Address</label>
      <textarea name="address" class="form-control" rows="3">{{ patient.address }}</textarea>
    </div>
    <button type="submit" class="btn btn-success">Save Changes</button>
    <a href="{{ url_for('patient_api.patient_dashboard') }}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
