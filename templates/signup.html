{% extends "layout.html" %}
{% block body %}
    <form action="{{ url_for('auth.signup') }}" method="post">
        <h3>Sign up</h3>
        <div class="mb-3">
            <label for="formGroupExampleInput" class="form-label">Name</label>
            <input type="text" class="form-control" id="formGroupExampleInput" name = "name" placeholder="Enter your name" required>
        </div>
        <div class="mb-3">
            <label for="formGroupExampleInput2" class="form-label">Username</label>
            <input type="text" class="form-control" id="formGroupExampleInput2" name = "username" placeholder="Enter your username" required>
        </div>
        <div class="mb-3">
            <label for="formGroupExampleInput2" class="form-label">Password</label>
            <input type="password" class="form-control" id="formGroupExampleInput2" name = "password" placeholder="Enter your password" required>
        </div>
        <a href="/">Already have an account Login</a><br><br>
        <button type="submit" class="btn btn-dark">Sign up</button>
    </form>
{% endblock %}
