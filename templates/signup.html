{% extends "layout.html" %}
{% block body %}
<style>
  body {
    background-color: #f8f9fa;
    font-family: "Poppins", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .container-signup {
    display: flex;
    align-items: stretch; /* makes divider full height */
    background: #ffffff;
    padding: 40px 60px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    width: 950px;
    min-height: 520px;
  }

  .app-name {
    flex: 1;
    font-size: 2.4rem;
    font-weight: 700;
    color: #0d6efd;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    border-right: 2px solid #dee2e6;
    margin-right: 40px;
  }

  .signup-form {
    flex: 1.5;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  h3 {
    text-align: center;
    color: #0d6efd;
    margin-bottom: 20px;
    font-weight: 600;
  }

  .btn-primary {
    width: 100%;
    background-color: #0d6efd;
    border: none;
  }

  select, input {
    border-radius: 6px;
    border: 1px solid #ced4da;
    padding: 6px 10px;
    width: 100%;
  }

  a {
    color: #0d6efd;
    text-decoration: none;
    font-size: 0.9rem;
  }

  a:hover {
    text-decoration: underline;
  }

  label {
    font-weight: 500;
  }
</style>

<div class="container-signup">
  <div class="app-name">
    HealthEase
  </div>

  <div class="signup-form">
    <form action="{{ url_for('auth.signup') }}" method="post">
      <h3>Sign Up</h3>

      <div class="row">
        <div class="col">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" name="name" placeholder="Enter your name" required>
        </div>
        <div class="col">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" name="username" placeholder="Enter your username" required>
        </div>
      </div><br>

      <div class="row">
        <div class="col">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" placeholder="Enter your password" required>
        </div>
        <div class="col">
          <label class="form-label">Age</label>
          <input type="number" class="form-control" name="age" placeholder="Enter your age" required>
        </div>
      </div><br>

      <div class="row">
        <div class="col">
          <label class="form-label">Gender</label>
          <select id="gender" name="gender" required>
            <option value="">-- Select Gender --</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </div>
        <div class="col">
          <label class="form-label">Contact</label>
          <input type="number" class="form-control" name="contact" placeholder="Enter your contact" required>
        </div>
      </div><br>

      <div class="row">
        <div class="col">
          <label class="form-label">Address</label>
          <input type="text" class="form-control" name="address" placeholder="Enter your address" required>
        </div>
      </div><br>

      <div class="text-end mb-3">
        <a href="/">Already have an account? Login</a>
      </div>

      <button type="submit" class="btn btn-primary">Sign Up</button>
    </form>
  </div>
</div>
{% endblock %}
