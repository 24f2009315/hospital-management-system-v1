{% extends "layout.html" %}
{% block body %}
    <h3 align = "center">Sign Up</h3>
    <form action="{{ url_for('auth.signup') }}" method="post">
        <div class="row">
            <div class="col">
                <label for="formGroupExampleInput" class="form-label">Name</label>
                <input type="text" class="form-control" placeholder="Enter your name" name = "name" aria-label="First name">
            </div>
            <div class="col">
                <label for="formGroupExampleInput" class="form-label">Username</label>
                <input type="text" class="form-control" placeholder="Enter your username" name = "username" aria-label="Last name">
            </div>
        </div><br>
        <div class="row">
            <div class="col">
                <label for="formGroupExampleInput" class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Enter your password" name = "password" aria-label="First name">
            </div>
            <div class="col">
                <label for="formGroupExampleInput" class="form-label">Age</label>
                <input type="number" class="form-control" placeholder="Enter your age" name = "age" aria-label="Last name">
            </div>
        </div><br>
        <div class="row">
            <div class="col">
                <label for="formGroupExampleInput" class="form-label">Gender</label>
                <select id="gender" name="gender" required>
                    <option value="">-- Select Gender --</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>
            <div class="col">
                <label for="formGroupExampleInput" class="form-label">Contact</label>
                <input type="number" class="form-control" placeholder="Enter your contact" name = "contact" aria-label="Last name">
            </div>
        </div><br>
        <div class="row">
            <div class="col">
                <label for="formGroupExampleInput" class="form-label">Address</label>
                <input type="text" class="form-control" placeholder="Enter your address" name = "address" aria-label="First name">
            </div>
        </div><br><br>
        <a href="/">Already have an account? Login</a><br><br>
        <button type="submit" class="btn btn-outline-dark">Sign up</button>
    </form>
{% endblock %}
